<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDGE Design Portal</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow:hidden;}
:root{
  --og:#E87722;--og-d:#c9601a;--og-10:rgba(232,119,34,.10);--og-06:rgba(232,119,34,.06);--og-15:rgba(232,119,34,.15);
  --tx:#18181b;--tx2:#52525b;--tx3:#a1a1aa;
  --bg:#ffffff;--pg:#F5F4F0;--pg2:#EEEDE8;
  --sb:#F0EFEB;--sb2:#E8E7E2;
  --br:rgba(0,0,0,.08);--brm:rgba(0,0,0,.12);--brs:rgba(0,0,0,.05);
  --fh:"Satoshi",-apple-system,sans-serif;
  --fb:"Inter",-apple-system,sans-serif;
  --fm:ui-monospace,"SFMono-Regular",monospace;
  --r4:4px;--r6:6px;--r8:8px;--r10:10px;--r14:14px;--r20:20px;
  --sh1:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);
  --sh3:0 12px 36px rgba(0,0,0,.10),0 3px 8px rgba(0,0,0,.04);
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
body{font-family:var(--fb);background:var(--pg);color:var(--tx);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.14);border-radius:2px;}
::selection{background:var(--og-15);color:var(--tx);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseLogo{0%,100%{transform:scale(1);opacity:.82}50%{transform:scale(1.045);opacity:1}}
@keyframes barLoad{0%{width:0;opacity:1}65%{width:70%}100%{width:100%}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes bump{from{transform:scale(.82);opacity:.5}to{transform:scale(1);opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
@keyframes orbGlow{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

/* LAYOUT */
.portal{display:flex;height:100vh;overflow:hidden;}
.main-area{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--pg);}

/* SIDEBAR */
.sidebar{width:216px;flex-shrink:0;background:linear-gradient(165deg,var(--sb) 0%,var(--sb2) 100%);display:flex;flex-direction:column;height:100%;overflow:hidden;border-right:1px solid rgba(0,0,0,.08);box-shadow:1px 0 0 rgba(0,0,0,.06);}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(0,0,0,.08);}
.sb-logo img{width:106px;display:block;}
.sb-sec{padding:14px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.sb-lbl{font-family:var(--fm);font-size:9px;color:rgba(0,0,0,.38);letter-spacing:.1em;text-transform:uppercase;}
.sb-add{background:none;border:none;cursor:pointer;color:var(--og);display:flex;align-items:center;padding:3px;border-radius:var(--r4);transition:background .15s;opacity:.8;}
.sb-add:hover{background:rgba(232,119,34,.15);opacity:1;}
.sb-new{padding:0 12px 10px;display:flex;gap:5px;animation:slideDown .2s var(--ease) both;}
.sb-new-input{flex:1;font-size:12px;padding:7px 10px;background:#fff;border:1px solid rgba(0,0,0,.14);border-radius:var(--r8);color:var(--tx);outline:none;font-family:var(--fb);transition:border-color .15s;}
.sb-new-input::placeholder{color:rgba(0,0,0,.3);}
.sb-new-input:focus{border-color:var(--og);}
.sb-new-ok{background:var(--og);border:none;border-radius:var(--r8);padding:0 11px;cursor:pointer;color:#fff;font-size:17px;font-weight:700;transition:background .15s,transform .1s;line-height:32px;height:32px;}
.sb-new-ok:hover{background:var(--og-d);}
.sb-new-ok:active{transform:scale(.92);}
.sb-clients{flex:1;overflow-y:auto;padding-bottom:4px;}
.sb-empty{padding:22px 16px;text-align:center;}
.sb-empty-ic{color:rgba(0,0,0,.2);margin:0 auto 10px;display:flex;justify-content:center;}
.sb-empty-tx{font-size:11px;color:rgba(0,0,0,.35);line-height:1.7;}
.cl-item{padding:8px 14px 8px 16px;cursor:pointer;display:flex;align-items:center;gap:9px;border-left:2.5px solid transparent;transition:background .13s,border-color .13s;}
.cl-item:hover{background:rgba(0,0,0,.04);}
.cl-item.active{background:rgba(232,119,34,.1);border-left-color:var(--og);}
.cl-avatar{width:28px;height:28px;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--fh);flex-shrink:0;color:#fff;letter-spacing:.02em;}
.cl-info{flex:1;min-width:0;}
.cl-name{font-size:12px;color:rgba(0,0,0,.75);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.cl-item.active .cl-name{font-weight:600;color:var(--tx);}
.cl-date{font-size:9px;color:rgba(0,0,0,.38);margin-top:2px;font-family:var(--fm);}
.cl-del{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.22);padding:4px;display:flex;border-radius:var(--r4);transition:color .13s,background .13s;opacity:0;flex-shrink:0;}
.cl-del{background:none;border:none;cursor:pointer;color:rgba(0,0,0,.22);padding:4px;display:flex;border-radius:var(--r4);transition:color .13s,background .13s;opacity:0;flex-shrink:0;}
.cl-item:hover .cl-del{opacity:1;}
.cl-del:hover{color:rgba(239,68,68,.8)!important;background:rgba(239,68,68,.1);}
.sb-foot{padding:12px 14px;border-top:1px solid rgba(0,0,0,.08);}
.sb-logout{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;background:none;border:1px solid rgba(0,0,0,.12);border-radius:var(--r8);cursor:pointer;color:rgba(0,0,0,.45);font-size:11px;font-family:var(--fb);transition:background .14s,color .14s,border-color .14s;}
.sb-logout:hover{background:rgba(0,0,0,.05);color:rgba(0,0,0,.75);border-color:rgba(0,0,0,.2);}

/* EMPTY STATE */
.empty-center{flex:1;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease;}
.empty-box{text-align:center;max-width:300px;}
.empty-icon{width:56px;height:56px;border-radius:var(--r14);background:rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--tx3);border:1px solid var(--br);}
.empty-h{font-family:var(--fh);font-size:18px;font-weight:700;font-style:italic;color:var(--tx);margin-bottom:7px;}
.empty-p{font-size:12px;color:var(--tx3);line-height:1.7;}

/* BUILDER */
.builder{display:flex;flex-direction:column;height:100%;animation:fadeIn .22s ease both;}
.builder-bar{display:flex;align-items:center;border-bottom:1px solid var(--br);background:var(--bg);padding:0 16px;gap:2px;flex-shrink:0;height:45px;box-shadow:0 1px 0 var(--brs);}
.builder-client{font-family:var(--fh);font-style:italic;font-size:14px;font-weight:700;color:var(--tx);margin-right:10px;padding-right:12px;border-right:1px solid var(--br);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.tab-btn{padding:0 13px;height:100%;border:none;background:none;font-size:12.5px;font-weight:500;font-family:var(--fb);cursor:pointer;color:var(--tx2);position:relative;transition:color .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.tab-btn::after{content:"";position:absolute;bottom:0;left:12px;right:12px;height:2px;background:var(--og);border-radius:2px 2px 0 0;opacity:0;transform:scaleX(.4);transition:opacity .18s,transform .22s var(--spring);}
.tab-btn.on{color:var(--tx);}
.tab-btn.on::after{opacity:1;transform:scaleX(1);}
.tab-btn:hover:not(.on){color:var(--tx);}
.tab-badge{font-size:9px;font-family:var(--fm);background:var(--og-10);color:var(--og);padding:1px 5px;border-radius:10px;font-weight:600;}
.bar-space{flex:1;}
.saved-toast{font-size:11px;color:#16a34a;font-family:var(--fm);letter-spacing:.03em;margin-right:5px;display:flex;align-items:center;gap:4px;animation:toastIn .2s ease both;}
.bar-btn{font-size:11px;padding:5px 12px;border-radius:var(--r6);background:none;border:1px solid var(--brm);color:var(--tx2);cursor:pointer;font-family:var(--fb);margin-left:4px;transition:background .13s,color .13s,border-color .13s;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.bar-btn:hover{background:#f4f4f5;color:var(--tx);border-color:rgba(0,0,0,.18);}
.bar-btn-og{background:var(--og);color:#fff;border-color:transparent;font-weight:600;box-shadow:0 2px 8px rgba(232,119,34,.24);}
.bar-btn-og:hover{background:var(--og-d);color:#fff;box-shadow:0 3px 12px rgba(232,119,34,.3);}

/* SETUP */
.setup-wrap{flex:1;overflow-y:auto;padding:40px 20px;background:var(--pg);display:flex;flex-direction:column;align-items:center;}
.setup-card{background:var(--bg);border:1px solid var(--br);border-radius:20px;padding:40px 44px;max-width:440px;width:100%;box-shadow:var(--sh2);animation:fadeUp .35s var(--ease) both;}
.setup-dots{display:flex;gap:6px;justify-content:center;margin-bottom:28px;}
.setup-dot{width:6px;height:6px;border-radius:50%;background:var(--brm);transition:background .2s,transform .2s var(--spring);}
.setup-dot.on{background:var(--og);transform:scale(1.35);}
.field-lbl{display:block;font-family:var(--fm);font-size:9px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.field-input{width:100%;font-family:var(--fb);font-size:14px;padding:11px 14px;border:1.5px solid var(--brm);border-radius:var(--r10);background:var(--bg);color:var(--tx);outline:none;transition:border-color .15s,box-shadow .15s;}
.field-input:focus{border-color:var(--og);box-shadow:0 0 0 3px var(--og-10);}
.field-input::placeholder{color:var(--tx3);}
.setup-divider{height:1px;background:var(--br);margin:22px 0;}
.counter{display:flex;align-items:center;gap:20px;justify-content:center;}
.counter-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--brm);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:border-color .15s,color .15s,background .15s,transform .1s var(--spring);font-size:20px;line-height:1;font-weight:200;box-shadow:var(--sh1);user-select:none;}
.counter-btn:hover{border-color:var(--og);color:var(--og);background:var(--og-06);}
.counter-btn:active{transform:scale(.88);}
.counter-btn:disabled{opacity:.3;cursor:not-allowed;}
.counter-val{font-family:"Georgia",serif;font-style:italic;font-size:44px;font-weight:300;min-width:58px;text-align:center;color:var(--tx);line-height:1;}
.counter-val.bump{animation:bump .22s var(--spring) both;}
.page-row{display:flex;gap:7px;align-items:center;animation:slideRight .2s var(--ease) both;}
.page-row-input{flex:1;font-family:var(--fb);font-size:12.5px;padding:8px 11px;border:1px solid var(--brm);border-radius:var(--r6);background:var(--bg);color:var(--tx);outline:none;transition:border-color .15s;}
.page-row-input:focus{border-color:var(--og);}
.subs-lbl{font-size:8.5px;color:var(--tx3);font-family:var(--fm);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
.mini-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--brm);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:14px;font-weight:300;transition:border-color .15s,color .15s;user-select:none;}
.mini-btn:hover{border-color:var(--og);color:var(--og);}
.subs-count{font-size:13px;font-weight:600;font-family:var(--fm);min-width:16px;text-align:center;color:var(--tx);}
.setup-actions{display:flex;gap:8px;margin-top:4px;}
.btn-og{background:var(--og);color:#fff;border:none;cursor:pointer;font-family:var(--fb);font-weight:600;font-size:13px;padding:12px 20px;border-radius:var(--r10);transition:background .14s,transform .08s,box-shadow .15s;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 3px 10px rgba(232,119,34,.22);}
.btn-og:hover{background:var(--og-d);box-shadow:0 4px 14px rgba(232,119,34,.3);}
.btn-og:active{transform:scale(.98);}
.btn-ghost{background:none;color:var(--tx2);border:1px solid var(--brm);cursor:pointer;font-family:var(--fb);font-size:12.5px;padding:10px 16px;border-radius:var(--r10);transition:background .14s,color .14s,border-color .14s;}
.btn-ghost:hover{background:#f4f4f5;color:var(--tx);border-color:rgba(0,0,0,.18);}

/* SITEMAP */
.sm-wrap{flex:1;overflow:auto;background:var(--pg);padding:26px 24px 44px;animation:fadeIn .25s ease both;}
.sm-top-row{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;margin-bottom:28px;}
.sm-top-group{display:flex;flex-direction:column;gap:0;}
.sm-top-group .sm-section-hd{margin-bottom:12px;}
.sm-top-group .sm-row{align-items:flex-start;}
.sm-section{margin-bottom:28px;}
.sm-section-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.sm-section-lbl{font-family:var(--fh);font-size:10.5px;font-weight:700;color:var(--tx);letter-spacing:.04em;text-transform:uppercase;background:var(--bg);padding:4px 12px;border-radius:20px;border:1px solid var(--brm);box-shadow:var(--sh1);display:flex;align-items:center;gap:7px;white-space:nowrap;}
.sm-section-lbl::before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--og);flex-shrink:0;}
.sm-section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,0,0,.08),transparent);}
.sm-section-count{font-family:var(--fm);font-size:9px;font-weight:600;color:var(--og);background:var(--og-10);padding:2px 7px;border-radius:10px;border:1px solid rgba(232,119,34,.15);}
.sm-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;}
.sm-col{display:flex;flex-direction:column;align-items:center;}
.sm-vline{width:1.5px;height:10px;background:linear-gradient(180deg,var(--brm),var(--br));margin:0 auto;flex-shrink:0;}

/* NODES */
.nw{display:inline-flex;align-items:center;gap:3px;position:relative;}
.node{display:inline-flex;align-items:center;border-radius:20px;padding:5px 12px;font-size:11.5px;font-weight:500;font-family:var(--fb);cursor:default;user-select:none;transition:box-shadow .15s,transform .13s var(--spring);white-space:nowrap;line-height:1.3;}
.node:hover{transform:translateY(-1px);}
.node.home{background:var(--tx);color:#fff;border:none;box-shadow:0 2px 8px rgba(0,0,0,.14);}
.node.main{background:var(--bg);color:var(--tx);border:1.5px solid var(--brm);box-shadow:var(--sh1);}
.node.sub{background:var(--bg);color:var(--tx2);border:1px solid var(--br);font-size:11px;font-weight:400;padding:4px 10px;}
.node.cta{background:var(--og);color:#fff;border:none;box-shadow:0 2px 6px rgba(232,119,34,.25);}
.node.cta-child{background:var(--og-10);color:var(--og-d);border:1px solid rgba(232,119,34,.22);font-size:10.5px;padding:3px 10px;}
.node.footer-node{background:rgba(0,0,0,.045);color:var(--tx2);border:1px solid var(--br);font-size:11px;padding:4px 10px;}
.nd{display:inline-flex;gap:1px;align-items:center;opacity:0;transition:opacity .15s;}
.nw:hover .nd{opacity:1;}
.na{background:none;border:none;cursor:pointer;color:var(--tx3);padding:2px 3px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;transition:background .12s,color .12s;}
.na:hover{background:rgba(0,0,0,.07);color:var(--tx2);}
.na.del:hover{background:rgba(239,68,68,.09);color:rgb(239,68,68);}
.node-input{font-size:11.5px;font-family:var(--fb);font-weight:500;padding:4px 11px;border:1.5px solid var(--og);border-radius:20px;background:var(--bg);color:var(--tx);outline:none;box-shadow:0 0 0 3px var(--og-10);}
.add-node-btn{background:none;border:1px dashed var(--brm);border-radius:20px;font-size:10px;color:var(--tx3);cursor:pointer;font-family:var(--fb);padding:3px 10px;display:inline-flex;align-items:center;gap:3px;transition:border-color .12s,color .12s,background .12s;}
.add-node-btn:hover{border-style:solid;border-color:var(--og);color:var(--og);background:var(--og-06);}

/* WIREFRAME */
.wf-wrap{display:flex;height:100%;overflow:hidden;animation:fadeIn .22s ease both;}
.wf-palette{width:148px;flex-shrink:0;border-right:1px solid var(--br);overflow-y:auto;padding:10px 9px 14px;background:#FAFAF8;}
.pal-cat-hd{font-family:var(--fm);font-size:8px;color:var(--og);letter-spacing:.1em;text-transform:uppercase;margin:10px 0 5px;display:flex;align-items:center;gap:5px;}
.pal-cat-hd::before{content:"";display:inline-block;width:10px;height:1px;background:var(--og);opacity:.5;}
.pal-item{padding:5px 8px;font-size:11px;font-family:var(--fb);border-radius:var(--r6);border:1px solid var(--br);background:var(--bg);color:var(--tx2);cursor:grab;user-select:none;margin-bottom:3px;display:flex;align-items:center;gap:6px;transition:border-color .13s,background .13s,transform .12s var(--spring),box-shadow .13s;box-shadow:var(--sh1);}
.pal-item:hover{border-color:var(--og);background:var(--og-06);color:var(--tx);transform:translateX(2px);box-shadow:var(--sh2);}
.pal-item:active{cursor:grabbing;transform:scale(.95);}
.pal-ic{width:18px;height:12px;background:rgba(0,0,0,.07);border-radius:2px;flex-shrink:0;position:relative;overflow:hidden;}
.pal-ic::after{content:"";position:absolute;left:2px;right:2px;top:50%;height:2px;margin-top:-1px;background:rgba(0,0,0,.18);border-radius:1px;}
.pal-ic.nav::after{top:3px;margin-top:0;height:1.5px;}
.pal-ic.hero{height:18px;}
.pal-ic.hero::after{top:6px;width:50%;margin-top:0;height:2px;}
.pal-ic.cta{background:rgba(232,119,34,.1);}
.pal-ic.cta::after{background:rgba(232,119,34,.35);}
.pal-ic.footer{background:rgba(0,0,0,.1);}
.pal-ic.multi::after{display:none;}
.pal-ic.multi::before{content:"";position:absolute;left:2px;right:2px;top:3px;height:1.5px;background:rgba(0,0,0,.18);border-radius:1px;box-shadow:0 3px 0 rgba(0,0,0,.15),0 6px 0 rgba(0,0,0,.1);}
.wf-canvas{flex:1;overflow-y:auto;padding:18px 20px;background:var(--bg);}
.canvas-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:360px;gap:12px;animation:fadeIn .3s ease;}
.canvas-empty-icon{width:48px;height:48px;border:1.5px dashed var(--brm);border-radius:var(--r14);display:flex;align-items:center;justify-content:center;color:var(--tx3);}
.canvas-empty-title{font-size:13.5px;font-weight:600;color:var(--tx2);font-family:var(--fh);}
.canvas-empty-sub{font-size:11.5px;color:var(--tx3);}
.canvas-browser{max-width:580px;margin:0 auto;border:1px solid var(--brm);border-radius:var(--r14);overflow:hidden;box-shadow:var(--sh3);}
.browser-chrome{background:#EFEEEA;padding:8px 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--br);}
.chrome-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.chrome-address{flex:1;height:20px;background:var(--bg);border-radius:10px;margin-left:7px;border:1px solid var(--br);display:flex;align-items:center;padding:0 10px;}
.chrome-url{font-size:10px;color:var(--tx3);font-family:var(--fm);}
.dz{height:4px;border-top:2px solid transparent;transition:border-top-color .1s,height .12s,background .12s;cursor:copy;position:relative;}
.dz.hot{height:22px;border-top-color:var(--og);background:linear-gradient(180deg,rgba(232,119,34,.09),transparent);}
.dz.hot::after{content:"Drop here";position:absolute;top:3px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--og);font-family:var(--fm);letter-spacing:.05em;white-space:nowrap;animation:fadeIn .1s ease;}
.blk{position:relative;border-bottom:1px solid rgba(0,0,0,.04);transition:background .12s;}
.blk:hover{background:rgba(0,0,0,.008);}
.blk-lbl{position:absolute;top:5px;left:20px;z-index:2;font-size:8px;font-family:var(--fm);color:var(--og);letter-spacing:.06em;text-transform:uppercase;opacity:.65;pointer-events:none;}
.blk-acts{position:absolute;top:5px;right:6px;display:flex;gap:2px;z-index:3;opacity:0;transition:opacity .15s;}
.blk:hover .blk-acts{opacity:1;}
.blk-drag{position:absolute;left:4px;top:50%;transform:translateY(-50%);z-index:3;color:var(--tx3);cursor:grab;padding:4px;opacity:0;transition:opacity .15s;display:flex;}
.blk:hover .blk-drag{opacity:1;}
.blk-btn{background:var(--bg);border:1px solid var(--br);border-radius:5px;cursor:pointer;color:var(--tx3);padding:3px;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s,border-color .12s;box-shadow:var(--sh1);}
.blk-btn:hover{background:#f4f4f5;color:var(--tx2);border-color:rgba(0,0,0,.16);}
.blk-btn.del:hover{background:rgba(239,68,68,.07);color:rgb(239,68,68);border-color:rgba(239,68,68,.2);}
.blk-content{padding-top:15px;}

/* LOGIN */
.login-screen{min-height:100vh;background:var(--pg);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
.login-blob1{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(232,119,34,.07) 0%,transparent 65%);top:-250px;right:-200px;pointer-events:none;animation:orbGlow 4s ease-in-out infinite;}
.login-blob2{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(232,119,34,.05) 0%,transparent 65%);bottom:-150px;left:-150px;pointer-events:none;animation:orbGlow 5s ease-in-out infinite reverse;}
.login-card{background:var(--bg);border:1px solid var(--br);border-radius:22px;padding:46px 46px 40px;width:430px;max-width:100%;box-shadow:var(--sh3);animation:fadeUp .5s var(--ease) both;position:relative;z-index:1;}
.login-logo{text-align:center;margin-bottom:30px;}
.login-logo img{width:174px;max-width:100%;}
.login-title{font-family:"Georgia",serif;font-size:22px;font-weight:400;font-style:italic;color:var(--tx);text-align:center;letter-spacing:-.01em;margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--tx3);text-align:center;font-family:var(--fm);letter-spacing:.07em;text-transform:uppercase;margin-bottom:22px;}
.login-hr{height:1px;background:var(--br);margin:0 0 22px;}
.login-inp-wrap{position:relative;margin-bottom:6px;}
.login-input{width:100%;font-size:14px;padding:12px 46px 12px 14px;border:1.5px solid var(--brm);border-radius:var(--r10);background:var(--pg);color:var(--tx);outline:none;font-family:var(--fb);transition:border-color .15s,box-shadow .15s;}
.login-input:focus{border-color:var(--og);box-shadow:0 0 0 3px var(--og-10);background:var(--bg);}
.login-input.err{border-color:#ef4444;animation:shake .4s ease;}
.login-input.err:focus{box-shadow:0 0 0 3px rgba(239,68,68,.1);}
.login-show{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tx3);font-size:10px;font-family:var(--fm);letter-spacing:.07em;padding:2px;transition:color .15s;}
.login-show:hover{color:var(--tx2);}
.login-err{font-size:11.5px;color:#ef4444;margin-top:8px;display:flex;align-items:center;gap:5px;animation:fadeIn .2s ease;}
.login-btn{width:100%;padding:13px;background:var(--og);color:#fff;border:none;border-radius:var(--r10);font-size:14px;font-weight:600;font-family:var(--fb);cursor:pointer;letter-spacing:.01em;transition:background .15s,transform .08s,box-shadow .15s;margin-top:20px;box-shadow:0 4px 14px rgba(232,119,34,.26);}
.login-btn:hover{background:var(--og-d);box-shadow:0 6px 18px rgba(232,119,34,.32);}
.login-btn:active{transform:scale(.99);}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--pg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s var(--ease);}
.loading-logo{animation:pulseLogo 2.2s ease-in-out infinite;}
.loading-logo img{width:158px;}
.loading-msg{color:rgba(0,0,0,.32);font-size:10.5px;margin-top:22px;font-family:var(--fm);letter-spacing:.14em;text-transform:uppercase;}
.loading-track{position:absolute;bottom:0;left:0;right:0;height:2.5px;background:rgba(0,0,0,.06);}
.loading-bar{height:100%;background:linear-gradient(90deg,var(--og-d),var(--og));border-radius:0 2px 2px 0;animation:barLoad 1.8s ease-in-out forwards;}

/* WIREFRAME BLOCK UTILITIES */
.wfb{display:flex;flex-direction:column;gap:5px;padding:10px 12px;}
.wfr{display:flex;gap:7px;}
</style>

  const[numMain,setNumMain]=useState(initialState?.numMain||4);
  const[numCtas,setNumCtas]=useState(initialState?.numCtas||2);
  const[pageSetups,setPageSetups]=useState(initialState?.pageSetups||[]);
  const[sitemap,setSitemap]=useState(initialState?.sitemap||null);
  const[canvas,setCanvas]=useState(initialState?.canvas||[]);
  const[tab,setTab]=useState(initialState?.tab||"sitemap");
  const[saved,setSaved]=useState(false);
  const[mainBump,setMainBump]=useState(false);
  const[ctaBump,setCtaBump]=useState(false);
  const saveTimer=useRef(null);
  const smRef=useRef(null);const wfRef=useRef(null);

  const bump=(setter,valSetter,fn)=>{setter(true);valSetter(fn);setTimeout(()=>setter(false),300);};

  const handleSave=useCallback(()=>{

    const mkCounter=(val,setVal,bump2,setBump2,lo,hi,lbl)=>e("div",{style:{marginBottom:4}},
      e("label",{className:"field-lbl"},lbl),

        e("button",{className:"counter-btn",disabled:val>=hi,onClick:()=>bump(setBump2,setVal,v=>Math.min(hi,v+1))},"+")
      ));

    if(step===1)return e("div",{className:"setup-wrap"},
      e("div",{className:"setup-card"},
        e("div",{className:"setup-dots"},
          e("div",{className:"setup-dot on"}),e("div",{className:"setup-dot"})),

          e("label",{className:"field-lbl"},"Project / Client Name"),
          e("input",{className:"field-input",value:proj,onChange:ev=>setProj(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&proj.trim()&&(initPages(numMain),setStep(2)),placeholder:"e.g. Acme Corp Website",autoFocus:true})),
        e("div",{className:"setup-divider"}),
        mkCounter(numMain,setNumMain,mainBump,setMainBump,1,10,"Main navigation pages (excl. Home)"),
        e("div",{className:"setup-divider"}),
        mkCounter(numCtas,setNumCtas,ctaBump,setCtaBump,0,6,"CTA buttons"),
        e("button",{className:"btn-og",style:{width:"100%",marginTop:24},disabled:!proj.trim(),onClick:()=>{initPages(numMain);setStep(2);}},"Continue →")));

    return e("div",{className:"setup-wrap"},
      e("div",{className:"setup-card"},
        e("div",{className:"setup-dots"},
          e("div",{className:"setup-dot"}),e("div",{className:"setup-dot on"})),
        e("div",{style:{marginBottom:4}},e("label",{className:"field-lbl"},"Configure Pages")),
        e("p",{style:{fontSize:11,color:"var(--tx3)",marginBottom:18}},"Name each page and set how many sub-pages it needs."),
        e("div",{style:{display:"flex",flexDirection:"column",gap:7,marginBottom:24}},
          pageSetups.map((ps,i)=>e("div",{key:i,className:"page-row",style:{animationDelay:`${i*0.04}s`}},
            e("input",{className:"page-row-input",value:ps.name,onChange:ev=>setPageSetups(p=>p.map((x,j)=>j===i?{...x,name:ev.target.value}:x))}),
            e("span",{className:"subs-lbl"},"Subs"),
            e("button",{className:"mini-btn",onClick:()=>setPageSetups(p=>p.map((x,j)=>j===i?{...x,subs:Math.max(0,x.subs-1)}:x))},"−"),
            e("span",{className:"subs-count"},ps.subs),
            e("button",{className:"mini-btn",onClick:()=>setPageSetups(p=>p.map((x,j)=>j===i?{...x,subs:Math.min(8,x.subs+1)}:x))},"+")))),
        e("div",{className:"setup-actions"},
          e("button",{className:"btn-ghost",onClick:()=>setStep(1)},"← Back"),
          e("button",{className:"btn-og",style:{flex:1},onClick:build},"Generate Sitemap →"))));
  }

  return e("div",{className:"builder"},
    e("div",{className:"builder-bar"},
      proj&&e("span",{className:"builder-client"},proj),
      e("button",{className:`tab-btn${tab==="sitemap"?" on":""}`,onClick:()=>setTab("sitemap")},"Sitemap"),
      e("button",{className:`tab-btn${tab==="wireframe"?" on":""}`,onClick:()=>setTab("wireframe")},
        "Wireframe",canvas.length>0&&e("span",{className:"tab-badge"},canvas.length)),
      e("div",{className:"bar-space"}),
      saved&&e("div",{className:"saved-toast"},e(IcCheck),"Saved"),
      e("button",{className:"bar-btn",onClick:handleSave,title:"Save (⌘S)"},"Save"),
      e("button",{className:"bar-btn",onClick:()=>{setSitemap(null);setStep(1);}},"New Setup"),
      e("button",{className:"bar-btn bar-btn-og",onClick:exportPDF},"↓ Export PDF")),
    tab==="sitemap"&&e("div",{ref:smRef,style:{flex:1,overflow:"auto"}},e(SitemapView,{sitemap,setSitemap})),
    tab==="wireframe"&&e("div",{ref:wfRef,style:{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}},e(WireframeView,{canvas,setCanvas})));
}

/* Login */
function LoginScreen({onLogin}){
  const[pwd,setPwd]=useState("");
  const[show,setShow]=useState(false);
  const[err,setErr]=useState(false);
  const[shaking,setShaking]=useState(false);
  const attempt=()=>{
    if(pwd===PWD){onLogin();}
    else{setErr(true);setShaking(true);setTimeout(()=>setShaking(false),500);}
  };
  return e("div",{className:"login-screen"},
    e("div",{className:"login-blob1"}),
    e("div",{className:"login-blob2"}),
    e("div",{className:"login-card"},
      e("div",{className:"login-logo"},e("img",{src:LOGO,alt:"EDGE"})),
      e("div",{className:"login-title"},"Design Portal"),
      e("div",{className:"login-sub"},"Internal Tools"),
      e("div",{className:"login-hr"}),
      e("div",{className:"login-inp-wrap"},
        e("input",{type:show?"text":"password",value:pwd,onChange:ev=>{setPwd(ev.target.value);setErr(false);},onKeyDown:ev=>ev.key==="Enter"&&attempt(),placeholder:"Enter your password",className:`login-input${shaking?" err":""}${err&&!shaking?" err":""}`}),
        e("button",{className:"login-show",onClick:()=>setShow(s=>!s)},show?"HIDE":"SHOW")),
      err&&e("div",{className:"login-err"},
        e("svg",{width:12,height:12,viewBox:"0 0 12 12",fill:"none",stroke:"#ef4444",strokeWidth:1.5},e("circle",{cx:6,cy:6,r:5}),e("line",{x1:6,y1:4,x2:6,y2:6.5}),e("line",{x1:6,y1:8,x2:6,y2:8.5})),
        "Incorrect password — please try again."),
      e("button",{className:"login-btn",onClick:attempt},"Sign In")));
}

/* Loading */
function LoadingScreen({message,visible}){
  return e("div",{className:"loading-screen",style:{opacity:visible?1:0,pointerEvents:visible?"all":"none"}},
    e("div",{className:"loading-logo"},e("img",{src:LOGO,alt:"EDGE"})),
    e("div",{className:"loading-msg"},message),
    e("div",{className:"loading-track"},visible&&e("div",{key:message,className:"loading-bar"})));
}

/* Portal */
function Portal({onLogout}){
  const[clients,setClients]=useState([]);
  const[activeId,setActiveId]=useState(null);
  const[clientState,setClientState]=useState(null);
  const[newName,setNewName]=useState("");
  const[showNew,setShowNew]=useState(false);
  const saveTimeout=useRef(null);
  const latestState=useRef(null);

  useEffect(()=>{
    const list=S.clients();setClients(list);
    if(list.length>0){const first=list[0];setActiveId(first.id);setClientState(S.clientState(first.id));}
  },[]);

  const flushSave=useCallback(()=>{if(activeId&&latestState.current)S.setClientState(activeId,latestState.current);},[activeId]);

  const selectClient=id=>{
    if(saveTimeout.current){clearTimeout(saveTimeout.current);saveTimeout.current=null;}
    flushSave();
    setActiveId(id);latestState.current=null;setClientState(S.clientState(id));
  };

  const handleStateChange=useCallback(state=>{
    latestState.current=state;
    if(saveTimeout.current)clearTimeout(saveTimeout.current);
    saveTimeout.current=setTimeout(()=>{if(activeId)S.setClientState(activeId,state);},400);
  },[activeId]);

  const createClient=()=>{
    const name=newName.trim();if(!name)return;
    const client={id:`c_${Date.now()}`,name,createdAt:Date.now()};
    const list=[...clients,client];setClients(list);S.setClients(list);
    setNewName("");setShowNew(false);
    flushSave();setActiveId(client.id);latestState.current=null;setClientState(null);
  };

  const deleteClient=(ev,id)=>{
    ev.stopPropagation();
    if(!confirm("Delete this client and all their data?"))return;
    const list=clients.filter(c=>c.id!==id);setClients(list);S.setClients(list);S.delClientState(id);
    if(activeId===id){const next=list[0];setActiveId(next?.id||null);setClientState(next?S.clientState(next.id):null);}
  };

  const doLogout=()=>{
    if(saveTimeout.current){clearTimeout(saveTimeout.current);saveTimeout.current=null;}
    flushSave();onLogout();
  };

  const fmt=ts=>new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  const activeClient=clients.find(c=>c.id===activeId);

  return e("div",{className:"portal"},
    e("div",{className:"sidebar"},
      e("div",{className:"sb-logo"},e("img",{src:LOGO,alt:"EDGE"})),
      e("div",{className:"sb-sec"},
        e("span",{className:"sb-lbl"},"Clients"),
        e("button",{className:"sb-add",onClick:()=>setShowNew(s=>!s),title:"Add client"},e(IcPlus,{s:11}))),
      showNew&&e("div",{className:"sb-new"},
        e("input",{className:"sb-new-input",value:newName,onChange:ev=>setNewName(ev.target.value),onKeyDown:ev=>{if(ev.key==="Enter")createClient();if(ev.key==="Escape")setShowNew(false);},placeholder:"Client name…",autoFocus:true}),
        e("button",{className:"sb-new-ok",onClick:createClient},"↵")),
      e("div",{className:"sb-clients"},
        clients.length===0&&!showNew&&e("div",{className:"sb-empty"},
          e("div",{className:"sb-empty-ic"},e(IcFolder)),
          e("div",{className:"sb-empty-tx"},"No clients yet.\nClick + to add one.")),
        clients.map(cl=>e("div",{key:cl.id,className:`cl-item${activeId===cl.id?" active":""}`,onClick:()=>selectClient(cl.id)},
          e("div",{className:"cl-avatar",style:{background:avatarColor(cl.name)}},cl.name[0].toUpperCase()),
          e("div",{className:"cl-info"},
            e("div",{className:"cl-name"},cl.name),
            e("div",{className:"cl-date"},fmt(cl.createdAt))),
          e("button",{className:"cl-del",onClick:ev=>deleteClient(ev,cl.id)},e(IcX,{s:7}))))),
      e("div",{className:"sb-foot"},
        e("button",{className:"sb-logout",onClick:doLogout},e(IcLogout),"Sign Out"))),
    e("div",{className:"main-area"},
      activeClient
        ?e(Builder,{key:activeId,initialState:clientState,onStateChange:handleStateChange,clientName:activeClient.name})
        :e("div",{className:"empty-center"},
            e("div",{className:"empty-box"},
              e("div",{className:"empty-icon"},e(IcFolder)),
              e("div",{className:"empty-h"},"Select a client"),
              e("div",{className:"empty-p"},clients.length===0?"Create your first client using the + button in the sidebar.":"Choose a client from the sidebar to open their workspace.")))));
}

/* App */
function App(){
  const[screen,setScreen]=useState("login");
  const[loading,setLoading]=useState(false);
  const[loadingMsg,setLoadingMsg]=useState("");
  const transition=(msg,action,dur=1500)=>{
    setLoadingMsg(msg);setLoading(true);
    setTimeout(()=>{action();setTimeout(()=>setLoading(false),300);},dur);
  };
  return e("div",{style:{height:"100vh",overflow:"hidden"}},
    screen==="login"&&e(LoginScreen,{onLogin:()=>transition("Signing in…",()=>setScreen("portal"))}),
    screen==="portal"&&e(Portal,{onLogout:()=>transition("Signing out…",()=>setScreen("login"),1300)}),
    e(LoadingScreen,{message:loadingMsg,visible:loading}));
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
});
